version: '3'

tasks:
  setup:
    desc: Install git hooks and project dependencies
    cmds:
      - pre-commit install
      - npm install

  build:
    desc: Compile TypeScript to dist/
    cmds:
      - npm run build

  test:
    desc: Run the full test suite once
    cmds:
      - npm test

  test:coverage:
    desc: Run the test suite with a coverage report
    cmds:
      - npm run test:coverage
