name: Release

on:
  push:
    branches: [main]

# release-please needs to push commits/tags and open the release PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + build provenance — no NPM_TOKEN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # OIDC trusted publishing requires npm >= 11.5.1; node 22 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # OIDC (id-token) authenticates the publish; --provenance attaches the
      # signed build attestation. Provenance needs CI + a public repo, which
      # is why it lives here and not in publishConfig (the manual bootstrap
      # publish from a laptop cannot generate it).
      - run: npm publish --provenance
