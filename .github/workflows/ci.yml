name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  license-headers:
    name: license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pre-commit
      # Constitution v1.1.0: the Apache-2.0 header is required on every
      # first-party TS source file. Only this hook runs in CI — the other
      # pre-commit hooks are enforced locally and a blanket --all-files run
      # would churn on pre-existing whitespace in vendored tooling dirs.
      - run: pre-commit run insert-license --all-files --show-diff-on-failure
